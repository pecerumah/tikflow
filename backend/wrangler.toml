# ============================================================
# TikFlow — Wrangler Configuration
# ============================================================

name               = "flowtik-worker"
main               = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── CRON SCHEDULER ──────────────────────────────────────────
[triggers]
crons = ["* * * * *"]

# ── D1 DATABASE ─────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "tikflow-db"
database_id   = "1c979d26-9de8-4818-a359-8bd7a74c8b3b"

# ── KV NAMESPACE ─────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id      = "5b570431f3c44f25979080ddd9f18dde"

# ── ENVIRONMENT VARIABLES ────────────────────────────────────
[vars]
FRONTEND_URL       = "https://flowtik.dimasgraft.workers.dev"
OAUTH_REDIRECT_URI = "https://flowtik-worker.dimasgraft.workers.dev/api/accounts/callback"
